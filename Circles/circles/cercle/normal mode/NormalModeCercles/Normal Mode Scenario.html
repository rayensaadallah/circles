<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cercles — Normal Mode Scenario</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; min-height: 100%; background: #f4ecd8;
    font-family: 'Inter', system-ui, sans-serif;
    display: flex; align-items: flex-start; justify-content: center;
  }
  button { font-family: inherit; }
  @keyframes nm-ring-pulse {
    0%, 100% { opacity: 0.9; transform: scale(1); }
    50%       { opacity: 0.3; transform: scale(1.14); }
  }
  @keyframes nm-dot-pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50%       { transform: scale(1.5); opacity: 0.35; }
  }
  @keyframes nm-fade-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
<template id="__bundler_thumbnail" data-bg-color="#f4ecd8">
  <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
    <!-- phone shape -->
    <rect x="130" y="40" width="140" height="320" rx="22" fill="#1a1410"/>
    <rect x="138" y="52" width="124" height="296" rx="14" fill="#f4ecd8"/>
    <!-- concentric circle ring -->
    <circle cx="200" cy="200" r="72" fill="none" stroke="#1a1410" stroke-width="1.2" stroke-dasharray="3 5" opacity="0.3"/>
    <!-- 5 player dots around ring -->
    <circle cx="200" cy="128" r="12" fill="#ff5a3c"/>
    <circle cx="261" cy="163" r="10" fill="#2d4cf5" opacity="0.25"/>
    <circle cx="237" cy="248" r="10" fill="#c8e84a" opacity="0.22"/>
    <circle cx="163" cy="248" r="10" fill="#ffc83a" opacity="0.22"/>
    <circle cx="139" cy="163" r="10" fill="#7a3a8a" opacity="0.22"/>
    <!-- active speaker ring pulse -->
    <circle cx="200" cy="128" r="19" fill="none" stroke="#c8e84a" stroke-width="2.2" opacity="0.8"/>
    <!-- timer bar -->
    <rect x="148" y="316" width="104" height="5" rx="2.5" fill="#ebdfc1"/>
    <rect x="148" y="316" width="62"  height="5" rx="2.5" fill="#c8e84a"/>
    <!-- notch -->
    <rect x="178" y="52" width="44" height="10" rx="5" fill="#1a1410"/>
  </svg>
</template>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── Theme — Block Party ──────────────────────────────────────
const T = {
  bg: '#f4ecd8', bgAlt: '#ebdfc1', ink: '#1a1410', inkSoft: '#5a4a35',
  paper: '#fbf6e8', primary: '#ff5a3c', primaryFg: '#fbf6e8',
  radius: 24, radiusSm: 14,
  fontDisplay: '"Space Grotesk", system-ui, sans-serif',
  fontBody: 'Inter, system-ui, sans-serif',
  fontMono: '"JetBrains Mono", monospace',
  displayWeight: 700, letterSpacing: '-0.02em',
  cardBorder: '1.5px solid #1a1410',
  cardShadow: '4px 4px 0 #1a1410',
  accents: {
    coral: '#ff5a3c', lime: '#c8e84a',
    cobalt: '#2d4cf5', yellow: '#ffc83a', plum: '#7a3a8a',
  },
};

// ─── Cast: 2 FOR, 3 AGAINST ───────────────────────────────────
const PLAYERS = [
  { id: 'kenza', name: 'Kenza', color: T.accents.coral,  side: 'FOR' },
  { id: 'adam',  name: 'Adam',  color: T.accents.cobalt, side: 'FOR' },
  { id: 'yas',   name: 'Yas',   color: T.accents.lime,   side: 'AGAINST' },
  { id: 'imane', name: 'Imane', color: T.accents.yellow, side: 'AGAINST' },
  { id: 'reda',  name: 'Reda',  color: T.accents.plum,   side: 'AGAINST' },
];

const FOR_PLAYERS     = PLAYERS.filter(p => p.side === 'FOR');
const AGAINST_PLAYERS = PLAYERS.filter(p => p.side === 'AGAINST');
const TOPIC = '"Long-distance relationships never work."';

// ─── Tiny helpers ─────────────────────────────────────────────
function Btn({ children, onClick, variant = 'primary', full = false, size = 'md', disabled = false, style: s = {} }) {
  const h = size === 'lg' ? 60 : size === 'sm' ? 36 : 52;
  const fs = size === 'lg' ? 18 : size === 'sm' ? 13 : 16;
  const isPrimary = variant === 'primary';
  const isOutline = variant === 'outline';
  return (
    <button onClick={disabled ? undefined : onClick} style={{
      height: h, padding: `0 ${size === 'sm' ? 14 : 24}px`,
      borderRadius: 999, width: full ? '100%' : 'auto',
      fontFamily: T.fontDisplay, fontWeight: 700, fontSize: fs,
      letterSpacing: T.letterSpacing, cursor: disabled ? 'default' : 'pointer',
      border: isPrimary ? T.cardBorder : isOutline ? `1.5px solid ${T.ink}` : 'none',
      background: isPrimary ? (disabled ? T.bgAlt : T.primary) : 'transparent',
      color: isPrimary ? (disabled ? T.inkSoft : T.primaryFg) : T.ink,
      boxShadow: isPrimary && !disabled ? T.cardShadow : 'none',
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8,
      transition: 'background 0.15s, box-shadow 0.15s',
      ...s,
    }}>{children}</button>
  );
}

function Card({ children, padding = 16, color, style: s = {}, onClick }) {
  return (
    <div onClick={onClick} style={{
      background: color || T.paper, borderRadius: T.radius,
      border: T.cardBorder, boxShadow: T.cardShadow,
      padding, ...s,
    }}>{children}</div>
  );
}

function Avatar({ p, size = 40, faded = false }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%',
      background: p.color, color: T.ink,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: T.fontDisplay, fontWeight: 700, fontSize: size * 0.42,
      flexShrink: 0, opacity: faded ? 0.22 : 1,
      transition: 'opacity 0.4s ease',
    }}>{p.name[0]}</div>
  );
}

function TopBar({ label, badge, right }) {
  return (
    <div style={{
      padding: '18px 20px 6px',
      display: 'flex', justifyContent: 'space-between', alignItems: 'center',
    }}>
      <div style={{ fontFamily: T.fontMono, fontSize: 11, letterSpacing: 2, color: T.inkSoft }}>{label}</div>
      {badge && (
        <div style={{
          padding: '3px 10px', borderRadius: 999,
          background: badge.bg, color: badge.color || T.ink,
          fontFamily: T.fontMono, fontSize: 9, fontWeight: 700, letterSpacing: 1.5,
        }}>{badge.text}</div>
      )}
      {right && <div style={{ fontFamily: T.fontMono, fontSize: 11, color: T.inkSoft }}>{right}</div>}
    </div>
  );
}

function TopicChip() {
  return (
    <div style={{
      margin: '4px 20px 0', padding: '10px 14px', borderRadius: T.radius,
      background: T.paper, border: T.cardBorder,
      fontFamily: T.fontDisplay, fontWeight: 500, fontSize: 14,
      color: T.ink, letterSpacing: T.letterSpacing, textAlign: 'center', lineHeight: 1.3,
    }}>{TOPIC}</div>
  );
}

// ─────────────────────────────────────────────────────────────
// Circle diagram — all 5 players equally spaced, no center
// speakerId: who's currently speaking (big + ring)
// doneIds: who already spoke (checkmark + dim)
// fadedSide: 'FOR' | 'AGAINST' | null — which side is ghosted
// ─────────────────────────────────────────────────────────────
function NormalCircle({ speakerId = null, doneIds = [], fadedSide = null, size = 288 }) {
  const cx = size / 2;
  const cy = size / 2;
  const ringR = size / 2 - 38;
  const phase = PLAYERS.find(p => p.id === speakerId)?.side || null;
  const phaseColor = phase === 'FOR' ? T.accents.lime : T.accents.cobalt;

  return (
    <div style={{ position: 'relative', width: size, height: size, flexShrink: 0 }}>
      {/* dashed ring */}
      <svg viewBox={`0 0 ${size} ${size}`}
        style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }}>
        <circle cx={cx} cy={cy} r={ringR}
          fill="none" stroke={T.ink} strokeWidth="1.2"
          strokeDasharray="3 6" opacity="0.2" />

        {/* connector lines */}
        {PLAYERS.map((p, i) => {
          const a = (i / PLAYERS.length) * Math.PI * 2 - Math.PI / 2;
          const x2 = cx + Math.cos(a) * ringR;
          const y2 = cy + Math.sin(a) * ringR;
          const isSpeaking = p.id === speakerId;
          return (
            <line key={p.id}
              x1={cx} y1={cy} x2={x2} y2={y2}
              stroke={isSpeaking ? phaseColor : T.inkSoft}
              strokeWidth={isSpeaking ? 2.5 : 0.8}
              opacity={isSpeaking ? 0.9 : 0.12}
              strokeDasharray={isSpeaking ? 'none' : '2 5'} />
          );
        })}
      </svg>

      {/* avatars */}
      {PLAYERS.map((p, i) => {
        const a = (i / PLAYERS.length) * Math.PI * 2 - Math.PI / 2;
        const ax = cx + Math.cos(a) * ringR;
        const ay = cy + Math.sin(a) * ringR;

        const isSpeaking    = p.id === speakerId;
        const isDone        = doneIds.includes(p.id);
        const isFadedSide   = fadedSide && p.side === fadedSide;

        let opacity = 1;
        if (isSpeaking)       opacity = 1;
        else if (isFadedSide) opacity = 0.18;
        else if (isDone)      opacity = 0.35;
        else                  opacity = 0.6;

        const avSize = isSpeaking ? 62 : 46;

        return (
          <div key={p.id} style={{
            position: 'absolute',
            left: ax - avSize / 2,
            top: ay - avSize / 2,
            display: 'flex', flexDirection: 'column', alignItems: 'center',
            opacity,
            transition: 'opacity 0.35s ease',
            zIndex: isSpeaking ? 3 : 1,
          }}>
            {/* pulsing ring for current speaker */}
            {isSpeaking && (
              <div style={{
                position: 'absolute',
                width: avSize + 16, height: avSize + 16,
                borderRadius: '50%',
                border: `2.5px solid ${phaseColor}`,
                top: -8, left: -8,
                animation: 'nm-ring-pulse 1.7s ease-in-out infinite',
                zIndex: 0,
              }} />
            )}

            {/* avatar bubble */}
            <div style={{
              width: avSize, height: avSize, borderRadius: '50%',
              background: p.color, color: T.ink,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontFamily: T.fontDisplay, fontWeight: 700,
              fontSize: isSpeaking ? 26 : 19,
              boxShadow: isSpeaking
                ? `0 0 0 3px ${T.bg}, 0 0 0 5.5px ${phaseColor}`
                : 'none',
              position: 'relative', zIndex: 1,
              transition: 'width 0.3s, height 0.3s, font-size 0.3s',
            }}>{p.name[0]}</div>

            {/* name label */}
            <div style={{
              marginTop: 5,
              fontFamily: T.fontMono, fontSize: isSpeaking ? 10 : 9,
              fontWeight: 700, letterSpacing: 0.8,
              color: isSpeaking ? T.ink : T.inkSoft,
              whiteSpace: 'nowrap',
            }}>{isSpeaking ? p.name : p.name[0]}</div>

            {/* done checkmark */}
            {isDone && (
              <div style={{
                position: 'absolute', top: -4, right: -4,
                width: 17, height: 17, borderRadius: '50%',
                background: T.accents.lime, border: `1.5px solid ${T.bg}`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 9, fontWeight: 900, color: T.ink, zIndex: 4,
              }}>✓</div>
            )}
          </div>
        );
      })}

      {/* center label */}
      <div style={{
        position: 'absolute', inset: 0,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        pointerEvents: 'none',
      }}>
        <div style={{ textAlign: 'center' }}>
          {speakerId && (
            <>
              <div style={{ fontFamily: T.fontMono, fontSize: 8, letterSpacing: 2, textTransform: 'uppercase', color: T.inkSoft }}>phase</div>
              <div style={{
                fontFamily: T.fontDisplay, fontWeight: 700, fontSize: 13,
                color: T.ink, letterSpacing: T.letterSpacing, marginTop: 1,
              }}>{phase}</div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// SCREEN 1 — TOPIC REVEAL
// Private vote — no results shown
// ─────────────────────────────────────────────────────────────
function ScreenTopicReveal({ onNav }) {
  const [picked, setPicked] = useState(null);
  const [confirmed, setConfirmed] = useState(false);

  const handleConfirm = () => {
    if (!picked || confirmed) return;
    setConfirmed(true);
    setTimeout(() => onNav('tally'), 750);
  };

  return (
    <div style={{ width: '100%', height: '100%', background: T.bg, display: 'flex', flexDirection: 'column', position: 'relative', overflow: 'hidden' }}>

      {/* Soft concentric rings */}
      <svg style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', pointerEvents: 'none' }}
        viewBox="0 0 393 852" preserveAspectRatio="xMidYMid slice">
        {[70, 140, 220, 310, 410].map((r, i) => (
          <circle key={i} cx="196" cy="300" r={r}
            fill="none" stroke={T.ink} strokeWidth="1" opacity={0.042 - i * 0.006} />
        ))}
      </svg>

      <TopBar label="Round 1 of 5" right="HOT TAKES" />

      {/* Question */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', padding: '0 28px', position: 'relative' }}>
        <div style={{
          fontFamily: T.fontMono, fontSize: 11, letterSpacing: 2.5,
          textTransform: 'uppercase', color: T.inkSoft, marginBottom: 18,
        }}>The question</div>
        <div style={{
          fontFamily: T.fontDisplay, fontWeight: T.displayWeight,
          fontSize: 38, lineHeight: 1.0, color: T.ink,
          letterSpacing: '-0.03em', textWrap: 'pretty',
        }}>
          Long-distance relationships never work.
        </div>
        <div style={{
          marginTop: 20, fontFamily: T.fontBody, fontSize: 14,
          color: T.inkSoft, lineHeight: 1.5,
        }}>
          Vote privately — no one sees your answer until everyone has chosen.
        </div>
      </div>

      {/* FOR / AGAINST cards */}
      <div style={{ padding: '0 20px 24px', position: 'relative' }}>
        <div style={{
          fontFamily: T.fontMono, fontSize: 10, letterSpacing: 2,
          textTransform: 'uppercase', color: T.inkSoft,
          marginBottom: 10, textAlign: 'center',
        }}>Your position</div>

        <div style={{ display: 'flex', gap: 10, marginBottom: 12 }}>
          {/* FOR */}
          <div onClick={() => !confirmed && setPicked('FOR')} style={{
            flex: 1, height: 80, borderRadius: T.radius,
            background: picked === 'FOR' ? T.accents.lime : T.paper,
            border: T.cardBorder,
            boxShadow: picked === 'FOR' ? T.cardShadow : 'none',
            display: 'flex', flexDirection: 'column',
            alignItems: 'center', justifyContent: 'center', gap: 3,
            cursor: confirmed ? 'default' : 'pointer',
            transition: 'background 0.15s, box-shadow 0.15s',
          }}>
            <div style={{
              fontFamily: T.fontDisplay, fontWeight: 700,
              fontSize: 22, color: T.ink, letterSpacing: T.letterSpacing,
            }}>FOR</div>
            <div style={{
              fontFamily: T.fontMono, fontSize: 9, letterSpacing: 1.5,
              color: T.inkSoft, textTransform: 'uppercase',
            }}>I agree</div>
          </div>

          {/* AGAINST */}
          <div onClick={() => !confirmed && setPicked('AGAINST')} style={{
            flex: 1, height: 80, borderRadius: T.radius,
            background: picked === 'AGAINST' ? T.accents.cobalt : T.paper,
            border: T.cardBorder,
            boxShadow: picked === 'AGAINST' ? T.cardShadow : 'none',
            display: 'flex', flexDirection: 'column',
            alignItems: 'center', justifyContent: 'center', gap: 3,
            cursor: confirmed ? 'default' : 'pointer',
            transition: 'background 0.15s, box-shadow 0.15s',
          }}>
            <div style={{
              fontFamily: T.fontDisplay, fontWeight: 700,
              fontSize: 22, color: picked === 'AGAINST' ? '#fff' : T.ink,
              letterSpacing: T.letterSpacing,
            }}>AGAINST</div>
            <div style={{
              fontFamily: T.fontMono, fontSize: 9, letterSpacing: 1.5,
              color: picked === 'AGAINST' ? 'rgba(255,255,255,0.7)' : T.inkSoft,
              textTransform: 'uppercase',
            }}>I disagree</div>
          </div>
        </div>

        {/* Confirm button */}
        <button onClick={handleConfirm} style={{
          width: '100%', height: 56, borderRadius: 999,
          background: picked && !confirmed ? T.ink : T.bgAlt,
          color: picked && !confirmed ? T.paper : T.inkSoft,
          border: 'none', cursor: picked && !confirmed ? 'pointer' : 'default',
          fontFamily: T.fontDisplay, fontWeight: 700, fontSize: 17,
          letterSpacing: T.letterSpacing,
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
          transition: 'background 0.2s',
        }}>
          {confirmed
            ? '✓ Locked in — waiting for others'
            : picked
              ? `Lock in · ${picked} →`
              : 'Choose your side first'}
        </button>

        {picked && !confirmed && (
          <div style={{
            marginTop: 9, textAlign: 'center',
            fontFamily: T.fontBody, fontSize: 12, color: T.inkSoft,
          }}>Your vote is hidden until everyone has answered.</div>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// SCREEN 2 — TALLY
// Reveals split: 2 FOR · 3 AGAINST. Host taps "Start Round".
// ─────────────────────────────────────────────────────────────
function ScreenTally({ onNav }) {
  const [revealed, setRevealed] = useState(false);
  useEffect(() => { const id = setTimeout(() => setRevealed(true), 300); return () => clearTimeout(id); }, []);

  return (
    <div style={{ width: '100%', height: '100%', background: T.bg, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <TopBar label="R1 · TALLY" right="MANG" />
      <TopicChip />

      <div style={{ padding: '18px 24px 0' }}>
        <div style={{
          fontFamily: T.fontDisplay, fontWeight: T.displayWeight, fontSize: 32,
          color: T.ink, letterSpacing: T.letterSpacing, lineHeight: 1.0,
        }}>The room<br />has voted.</div>
        <div style={{ fontFamily: T.fontBody, fontSize: 13, color: T.inkSoft, marginTop: 6 }}>
          Here's how the group split.
        </div>
      </div>

      {/* Split bar */}
      <div style={{ padding: '16px 20px 0' }}>
        <div style={{
          display: 'flex', height: 70, borderRadius: T.radius, overflow: 'hidden',
          border: T.cardBorder, boxShadow: T.cardShadow,
        }}>
          <div style={{
            flex: 2, background: T.accents.lime, color: T.ink,
            display: 'flex', alignItems: 'center', paddingLeft: 18, gap: 10,
          }}>
            <div>
              <div style={{ fontFamily: T.fontMono, fontSize: 9, letterSpacing: 1.5, opacity: 0.7 }}>FOR</div>
              <div style={{ fontFamily: T.fontDisplay, fontWeight: T.displayWeight, fontSize: 36, lineHeight: 1, letterSpacing: T.letterSpacing }}>2</div>
            </div>
          </div>
          <div style={{
            flex: 3, background: T.accents.cobalt, color: '#fff',
            display: 'flex', alignItems: 'center', justifyContent: 'flex-end', paddingRight: 18,
          }}>
            <div style={{ textAlign: 'right' }}>
              <div style={{ fontFamily: T.fontMono, fontSize: 9, letterSpacing: 1.5, opacity: 0.8 }}>AGAINST</div>
              <div style={{ fontFamily: T.fontDisplay, fontWeight: T.displayWeight, fontSize: 36, lineHeight: 1, letterSpacing: T.letterSpacing }}>3</div>
            </div>
          </div>
        </div>
      </div>

      {/* Names columns */}
      <div style={{
        padding: '12px 20px 0', display: 'flex', gap: 10,
        opacity: revealed ? 1 : 0,
        transform: revealed ? 'translateY(0)' : 'translateY(6px)',
        transition: 'opacity 0.45s ease, transform 0.45s ease',
      }}>
        {[
          { label: 'FOR', list: FOR_PLAYERS, accent: T.accents.lime },
          { label: 'AGAINST', list: AGAINST_PLAYERS, accent: T.accents.cobalt },
        ].map((col, ci) => (
          <Card key={ci} padding={12} style={{ flex: 1 }}>
            <div style={{
              fontFamily: T.fontMono, fontSize: 9, letterSpacing: 1.5,
              color: T.inkSoft, marginBottom: 10, textTransform: 'uppercase',
            }}>{col.label}</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {col.list.map(p => (
                <div key={p.id} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <Avatar p={p} size={28} />
                  <div style={{ fontFamily: T.fontBody, fontSize: 13, fontWeight: 600, color: T.ink }}>{p.name}</div>
                </div>
              ))}
            </div>
          </Card>
        ))}
      </div>

      {/* Rule card */}
      <div style={{ flex: 1, padding: '10px 20px 0', display: 'flex', alignItems: 'flex-end' }}>
        <Card padding={14} style={{ width: '100%' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <svg width="44" height="44" viewBox="0 0 44 44">
              <circle cx="22" cy="22" r="18" fill="none" stroke={T.ink} strokeWidth="1.2" strokeDasharray="3 4" opacity="0.25" />
              {PLAYERS.map((p, i) => {
                const a = (i / PLAYERS.length) * Math.PI * 2 - Math.PI / 2;
                return (
                  <circle key={p.id}
                    cx={22 + Math.cos(a) * 11} cy={22 + Math.sin(a) * 11}
                    r="4"
                    fill={p.side === 'FOR' ? T.accents.lime : T.accents.cobalt}
                    opacity={p.side === 'FOR' ? 1 : 0.4}
                  />
                );
              })}
            </svg>
            <div style={{ flex: 1 }}>
              <div style={{ fontFamily: T.fontDisplay, fontWeight: 700, fontSize: 16, color: T.ink, letterSpacing: T.letterSpacing, lineHeight: 1 }}>
                FOR speaks first
              </div>
              <div style={{ fontFamily: T.fontBody, fontSize: 12, color: T.inkSoft, marginTop: 3, lineHeight: 1.4 }}>
                Each person gets 60s. AGAINST listens, then responds one by one.
              </div>
            </div>
          </div>
        </Card>
      </div>

      <div style={{ padding: '12px 20px 24px' }}>
        <Btn full size="lg" onClick={() => onNav('round-for')}>Start Round →</Btn>
      </div>

  { id: 'topic',             label: '1 · Topic Reveal',         Component: ScreenTopicReveal },
  { id: 'tally',             label: '2 · Tally',                Component: ScreenTally },
  { id: 'round-for',        label: '3 · FOR speaks (Kenza)',    Component: ScreenRoundFor },
  { id: 'round-for-adam',   label: '4 · FOR speaks (Adam)',     Component: ScreenRoundForAdam },
  { id: 'round-against',    label: '5 · AGAINST speaks (Yas)',  Component: ScreenRoundAgainst },
  { id: 'round-against-last',label:'6 · AGAINST speaks (Reda)', Component: ScreenRoundAgainstLast },
  { id: 'mindchange',       label: '7 · Change your mind?',     Component: ScreenMindChange },
  { id: 'attribution',      label: '8 · Attribution',           Component: ScreenAttribution },
];

function App() {
  const [idx, setIdx] = useState(0);

  function onNav(id) {
    const i = SCREENS.findIndex(s => s.id === id);
    if (i !== -1) setIdx(i);
  }

  const { label, Component } = SCREENS[idx];

  return (
    <div style={{
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      gap: 20, padding: '32px 20px 48px',
    }}>
      {/* Title */}
      <div style={{
        fontFamily: T.fontDisplay, fontWeight: 700, fontSize: 13,
        color: T.ink, letterSpacing: '0.08em', textTransform: 'uppercase',
        display: 'flex', alignItems: 'center', gap: 10,
      }}>
        <svg width="20" height="20" viewBox="0 0 20 20">
          {Array.from({ length: 8 }).map((_, i) => {
            const a = (i / 8) * Math.PI * 2 - Math.PI / 2;
            const x = 10 + Math.cos(a) * 7;
            const y = 10 + Math.sin(a) * 7;
            return <circle key={i} cx={x} cy={y} r={i === 0 ? 4 : 2} fill={i === 0 ? T.primary : T.ink} opacity={i === 0 ? 1 : 0.7} />;
          })}
        </svg>
        Cercles · Normal Mode Scenario
      </div>

      {/* Screen nav pills */}
      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', justifyContent: 'center', maxWidth: 600 }}>
        {SCREENS.map((s, i) => (
          <button key={s.id} onClick={() => setIdx(i)} style={{
            padding: '6px 13px', borderRadius: 999, border: 'none', cursor: 'pointer',
            background: i === idx ? T.ink : 'transparent',
            color: i === idx ? T.paper : T.ink,
            outline: i !== idx ? `1px solid rgba(26,20,16,0.25)` : 'none',
            fontFamily: T.fontDisplay, fontWeight: 600, fontSize: 12,
          }}>{s.label}</button>
        ))}
      </div>

      {/* Phone */}
      <Phone>
        <Component onNav={onNav} />
      </Phone>

      {/* Prev / Next */}
      <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
        <button onClick={() => setIdx(i => Math.max(0, i - 1))} style={{
          padding: '10px 18px', borderRadius: 999, border: 'none', cursor: 'pointer',
          background: 'transparent', color: T.ink,
          outline: `1px solid rgba(26,20,16,0.25)`,
          fontFamily: T.fontDisplay, fontWeight: 600, fontSize: 13,
          opacity: idx === 0 ? 0.3 : 1,
        }}>← Prev</button>
        <div style={{ fontFamily: T.fontMono, fontSize: 12, color: T.inkSoft }}>
          {idx + 1} / {SCREENS.length} · {label}
        </div>
        <button onClick={() => setIdx(i => Math.min(SCREENS.length - 1, i + 1))} style={{
          padding: '10px 18px', borderRadius: 999, border: 'none', cursor: 'pointer',
          background: T.primary, color: T.primaryFg, border: T.cardBorder,
          boxShadow: T.cardShadow,
          fontFamily: T.fontDisplay, fontWeight: 600, fontSize: 13,
          opacity: idx === SCREENS.length - 1 ? 0.3 : 1,
        }}>Next →</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
